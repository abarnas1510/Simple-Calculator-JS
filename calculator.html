<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Simple Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* prevent accidental text selection on double-click */
        }

        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* calculator card */
        .calculator {
            background: #1e2a32;
            border-radius: 48px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.08);
            padding: 24px 20px 28px 20px;
            width: 100%;
            max-width: 380px;
            transition: all 0.2s ease;
        }

        /* display panel */
        .display {
            background: #0d1b21;
            border-radius: 32px;
            padding: 20px 24px;
            margin-bottom: 28px;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.5), 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: right;
            word-wrap: break-word;
            word-break: break-all;
        }

        .expression {
            font-size: 1.2rem;
            color: #90b4ce;
            min-height: 28px;
            letter-spacing: 0.5px;
            font-weight: 400;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
        }

        .current-number {
            font-size: 2.8rem;
            font-weight: 600;
            color: #f0f9ff;
            line-height: 1.2;
            letter-spacing: 1px;
            font-family: 'Segoe UI', monospace;
            overflow-x: auto;
            white-space: nowrap;
        }

        /* small note for overflow */
        .current-number::-webkit-scrollbar {
            height: 3px;
            background: #2e4a62;
            border-radius: 10px;
        }

        /* button grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* common button style */
        .btn {
            background: #2c3e44;
            border: none;
            border-radius: 28px;
            font-size: 1.6rem;
            font-weight: 500;
            padding: 16px 0;
            cursor: pointer;
            transition: all 0.1s linear;
            color: #eef4ff;
            box-shadow: 0 4px 0 #0f1a1f;
            font-family: monospace;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0f1a1f;
        }

        /* special styles */
        .btn-operator {
            background: #f39c12;
            color: #1e272e;
            box-shadow: 0 4px 0 #b86f0c;
            font-weight: 700;
            font-size: 1.9rem;
        }

        .btn-equals {
            background: #2ecc71;
            color: #0f2c1c;
            box-shadow: 0 4px 0 #1f8a4c;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .btn-clear {
            background: #c44536;
            box-shadow: 0 4px 0 #83281d;
            color: white;
            font-weight: 600;
        }

        .btn-backspace {
            background: #5d6e7a;
            box-shadow: 0 4px 0 #3c4a55;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .btn-zero {
            grid-column: span 2;
        }

        /* responsive */
        @media (max-width: 450px) {
            .buttons {
                gap: 10px;
            }
            .btn {
                padding: 14px 0;
                font-size: 1.4rem;
            }
            .current-number {
                font-size: 2.2rem;
            }
            .expression {
                font-size: 1rem;
            }
            .calculator {
                padding: 18px 16px 22px;
            }
        }
    </style>
</head>
<body>
<div class="calculator">
    <div class="display">
        <div class="expression" id="expressionDisplay"></div>
        <div class="current-number" id="currentDisplay">0</div>
    </div>
    <div class="buttons">
        <!-- Row 1 -->
        <button class="btn btn-clear" data-action="clear">AC</button>
        <button class="btn btn-backspace" data-action="backspace">⌫</button>
        <button class="btn btn-operator" data-op="/">÷</button>
        <button class="btn btn-operator" data-op="*">×</button>
        
        <!-- Row 2 -->
        <button class="btn" data-num="7">7</button>
        <button class="btn" data-num="8">8</button>
        <button class="btn" data-num="9">9</button>
        <button class="btn btn-operator" data-op="-">−</button>
        
        <!-- Row 3 -->
        <button class="btn" data-num="4">4</button>
        <button class="btn" data-num="5">5</button>
        <button class="btn" data-num="6">6</button>
        <button class="btn btn-operator" data-op="+">+</button>
        
        <!-- Row 4 -->
        <button class="btn" data-num="1">1</button>
        <button class="btn" data-num="2">2</button>
        <button class="btn" data-num="3">3</button>
        <button class="btn btn-equals" data-action="equals">=</button>
        
        <!-- Row 5: zero & decimal -->
        <button class="btn btn-zero" data-num="0">0</button>
        <button class="btn" data-num=".">.</button>
    </div>
</div>

<script src="calculator.js"></script>
</body>
</html>
